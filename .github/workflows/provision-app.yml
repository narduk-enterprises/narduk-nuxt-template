name: Provision App

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "Lowercase kebab-case app slug (e.g. my-cool-app)"
        required: true
        type: string
      display-name:
        description: "Human-readable display name (e.g. My Cool App)"
        required: true
        type: string
      app-url:
        description: "Production URL (e.g. https://my-cool-app.nard.uk)"
        required: true
        type: string
      github-repo:
        description: "Full GitHub repo path (e.g. narduk-enterprises/my-cool-app)"
        required: true
        type: string
      provision-id:
        description: "Control plane provision job ID for status callbacks"
        required: true
        type: string

concurrency:
  group: provision-${{ github.event.inputs.app-name }}
  cancel-in-progress: false

env:
  NUXT_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  provision:
    name: "Provision ${{ github.event.inputs.app-name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # ── Setup ──
      - name: Validate inputs
        run: |
          if ! echo "${{ inputs.app-name }}" | grep -qP '^[a-z0-9][a-z0-9-]*$'; then
            echo "::error::Invalid app-name: must match /^[a-z0-9][a-z0-9-]*$/"
            exit 1
          fi
          echo "📦 Provisioning: ${{ inputs.display-name }} (${{ inputs.app-name }})"
          echo "   URL: ${{ inputs.app-url }}"
          echo "   Repo: ${{ inputs.github-repo }}"
          echo "   Provision ID: ${{ inputs.provision-id }}"

      - name: Update provision status → cloning
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/status" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "cloning"}' \
            || echo "⚠️ Status update failed (non-fatal)"

      # ── Clone template into the new repo ──
      - uses: actions/checkout@v4
        with:
          path: app-source

      - name: Prepare new repository
        run: |
          cd app-source
          rm -rf .git
          git init
          git remote add origin "https://x-access-token:${{ secrets.GH_SERVICE_TOKEN }}@github.com/${{ inputs.github-repo }}.git"

      # ── Install + Setup ──
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: app-source/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: app-source
        run: pnpm install --no-frozen-lockfile

      - name: Update provision status → initializing
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/status" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "initializing"}' \
            || echo "⚠️ Status update failed (non-fatal)"

      - name: Run init.ts (setup script)
        working-directory: app-source
        run: |
          pnpm run setup -- \
            --name="${{ inputs.app-name }}" \
            --display="${{ inputs.display-name }}" \
            --url="${{ inputs.app-url }}"

      # ── Initial commit + push ──
      - name: Commit and push
        working-directory: app-source
        run: |
          git add -A
          git config user.name "narduk-bot"
          git config user.email "bot@nard.uk"
          git commit -m "chore: initialize ${{ inputs.app-name }} from narduk-nuxt-template"
          git push -u origin main

      # ── Analytics setup (requires Doppler) ──
      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_HUB_TOKEN }}
          inject-env-vars: true

      - name: Update provision status → deploying
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/status" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "deploying"}' \
            || echo "⚠️ Status update failed (non-fatal)"

      # ── Build + Deploy ──
      - name: Build and deploy
        working-directory: app-source/apps/web
        run: |
          pnpm build
          pnpm exec wrangler deploy

      # ── Post-deploy: GSC verification ──
      - name: Run analytics setup (post-deploy)
        working-directory: app-source
        continue-on-error: true
        env:
          DOPPLER_PROJECT: ${{ inputs.app-name }}
          DOPPLER_CONFIG: prd
          APP_NAME: ${{ inputs.app-name }}
        run: |
          if [ -f "tools/setup-analytics.ts" ]; then
            npx jiti tools/setup-analytics.ts all || echo "⚠️ Analytics setup deferred"
          fi

      # ── Callback to control plane ──
      - name: Report success
        if: success()
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/complete" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"complete\",
              \"deployedUrl\": \"${{ inputs.app-url }}\",
              \"githubRepo\": \"${{ inputs.github-repo }}\"
            }"

      - name: Report failure
        if: failure()
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/complete" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"failed\",
              \"errorMessage\": \"Provisioning failed — check GitHub Actions logs for ${{ github.run_id }}\"
            }"
